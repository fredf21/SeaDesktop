project:
  name: SeaDesktopDemo

services:
  - name: CCNBService
    port: 8080

    security:
      authentication:
        type: none   # pas d'auth (mode dev rapide)

      # Pas d'authorization → toutes les routes ouvertes
      # Pas de rate_limit, pas de CORS, pas de headers

    database:
      type: memory

    entities:
      - name: Department
        options:
          enable_crud: true
          public_routes: true
        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true
            unique: true


        relations:
          - name: employees
            kind: has_many
            target_entity: Employee
            fk_column: department_id
            on_delete: cascade

      - name: Employee
        options:
          enable_crud: true
          public_routes: true
        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true

          - name: email
            type: email
            required: true
            unique: true

          - name: age
            type: int
            required: false

          - name: department_id
            type: uuid
            required: false

        relations:
          - name: department
            kind: belongs_to
            target_entity: Department
            fk_column: department_id
            on_delete: restrict

      - name: Student
        options:
          enable_crud: true
          public_routes: true
        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true

          - name: email
            type: email
            required: true
            unique: true

          - name: age
            type: int
            required: false
        seeds:
          - alias: yann
            name: Yann
            email: yann@school.ca
            age: 20
            programs: [prog_cs, prog_eng]
            
      - name: Program
        options:
          enable_crud: true
          public_routes: true
        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true
            unique: true
        seeds:
          - alias: prog_cs
            name: Computer Science
          - alias: prog_eng
            name: Engineering
