project:
  name: SeaDesktopDemo1

services:
  - name: CCNBService
    port: 8081

    security:
      authentication:
        type: jwt
        algorithm: HS256
        secret: "${SEA_DESKTOP_JWT_SECRET}"
        issuer: "CCNBService"
        audience: "seadesktop-client"
        access_token_ttl: "15m"
        refresh_token_ttl: "7d"

      cors:
        allowed_origins:
          - "http://localhost:5173"
          - "http://localhost:3000"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allow_credentials: true
        max_age: "1h"

      rate_limits:
        - scope: per_ip
          requests: 100
          window: "60s"

      http_limits:
        max_body_size: "10MB"
        max_header_size: "8KB"
        max_headers_count: 100
        max_url_length: "2KB"
        max_query_params: 100
        request_timeout: "30s"
        keep_alive_timeout: "60s"
        max_connections_per_ip: 100

      headers:
        preset: recommended

    database:
      type: mysql
      host: 127.0.0.1
      port: 3306
      database_name: seadesktop
      username: root
      password: root

    entities:
      - name: User
        table_name: User
        options:
          enable_crud: true
          is_auth_source: true
          public_routes: false

        fields:
          - name: id
            type: uuid
            required: false
            unique: true

          - name: email
            type: email
            required: true
            unique: true

          - name: password
            type: password
            required: true
            serializable: false

          - name: full_name
            type: string
            required: true

          - name: role
            type: string
            required: false
            default: user

      - name: Department
        table_name: Department
        options:
          enable_crud: true
          public_routes: false

        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true
            unique: true

        relations:
          - name: employees
            kind: has_many
            target_entity: Employee
            fk_column: department_id
            on_delete: cascade

      - name: Employee
        table_name: Employee
        options:
          enable_crud: true
          public_routes: false

        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true

          - name: email
            type: email
            required: true
            unique: true

          - name: age
            type: int
            required: false

          - name: department_id
            type: uuid
            required: false

        relations:
          - name: department
            kind: belongs_to
            target_entity: Department
            fk_column: department_id
            on_delete: restrict

      - name: Student
        table_name: Student
        options:
          enable_crud: true
          public_routes: false

        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true

          - name: email
            type: email
            required: true
            unique: true

          - name: age
            type: int
            required: false

        relations:
          - name: programs
            kind: many_to_many
            target_entity: Program
            pivot_table: StudentProgram
            source_fk_column: student_id
            target_fk_column: program_id
            on_delete: cascade

      - name: Program
        table_name: Program
        options:
          enable_crud: true
          public_routes: false

        fields:
          - name: id
            type: uuid
            required: true
            unique: true

          - name: name
            type: string
            required: true
            unique: true

        relations:
          - name: students
            kind: many_to_many
            target_entity: Student
            pivot_table: StudentProgram
            source_fk_column: program_id
            target_fk_column: student_id
            on_delete: cascade

      - name: StudentProgram
        table_name: StudentProgram
        options:
          enable_crud: true
          public_routes: false

        fields:
          - name: student_id
            type: uuid
            required: true

          - name: program_id
            type: uuid
            required: true
